name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
          persist-credentials: false
      - run: cargo test --all-features

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Regenerate conformance snapshots
        run: cargo run -p conformance
      - name: Assert snapshots are unchanged
        run: |
          git add tasks/conformance/snapshots
          git diff --cached --exit-code -- tasks/conformance/snapshots \
            || { echo '::error::conformance snapshots are stale — run `just conformance` and commit the result'; exit 1; }

  playground:
    name: playground
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: wasm-pack
      - run: wasm-pack build --target web --no-typescript wasm
