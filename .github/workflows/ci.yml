name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - run: cargo test --all-features
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: cratesio-auth
      - name: Publish crates
        if: ${{ github.event_name == 'push' }}
        run: |
          if ! git show --exit-code -G^version raffia_macro/Cargo.toml; then
            cargo publish -p raffia_macro
          fi
          if ! git show --exit-code -G^version raffia/Cargo.toml; then
            cargo publish -p raffia
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio-auth.outputs.token }}

  playground:
    name: playground
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: wasm-pack
      - run: wasm-pack build --target web --no-typescript wasm
      - name: Deploy Production
        run: |
          npm i --location=global netlify-cli
          netlify deploy --site=3c60cb99-3e5c-4e0e-9f69-d1952439e0b5 --dir=wasm/pkg --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
